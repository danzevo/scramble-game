services:
  postgres:
    image: postgres:15
    container_name: scramble-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: scramble_game
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scramble-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: